services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: unless-stopped
    command: --log-dir /app/logs
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      PORT: ${NEW_API_PORT}
      SESSION_SECRET: ${SESSION_SECRET}
      CRYPTO_SECRET: ${CRYPTO_SECRET}
      STREAMING_TIMEOUT: ${STREAMING_TIMEOUT}
      MAX_REQUEST_BODY_MB: ${MAX_REQUEST_BODY_MB}
      ERROR_LOG_ENABLED: ${ERROR_LOG_ENABLED}
      GENERATE_DEFAULT_TOKEN: ${GENERATE_DEFAULT_TOKEN}
      SQLITE_PATH: /data/sqlite.db
      SQL_DSN: ${SQL_DSN}
      REDIS_CONN_STRING: ${REDIS_CONN_STRING}
      NODE_NAME: new-api-node-1
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:${NEW_API_PORT}:${NEW_API_PORT}"
    expose:
      - "${NEW_API_PORT}"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:${NEW_API_PORT}/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    depends_on:
      new-api:
        condition: service_healthy
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${CADDY_HTTP_PORT}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
